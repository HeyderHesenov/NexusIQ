# Ruff configuration for the NexusIQ backend.
target-version = "py313"
line-length = 100

[lint]
select = ["E", "F", "I", "B", "UP"]
# E501: line length is not enforced (formatter's job).
# B008: FastAPI intentionally calls Depends()/Query() in argument defaults.
ignore = ["E501", "B008"]

[lint.per-file-ignores]
# Re-exports in package __init__ files.
"__init__.py" = ["F401"]
# Alembic migration scaffolding.
"alembic/**" = ["F401", "E402"]

[lint.isort]
known-first-party = ["app"]
