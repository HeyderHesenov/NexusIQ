# Local git hooks. Install with:  pip install pre-commit && pre-commit install
# Hooks run only on staged files, so they never rewrite the whole tree.
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-added-large-files
        args: ["--maxkb=2048"]
      - id: check-merge-conflict
      - id: detect-private-key

  # Secret scanning — the primary guard against committing credentials.
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  # Python lint (backend only). Config in backend/ruff.toml.
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: ["--fix"]
        files: ^backend/
